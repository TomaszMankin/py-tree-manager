name: PR build

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  install-and-test:
    name: Install and test
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run L0 tests (unit, all deps mocked)
        run: python -m pytest src/tests/L0

      - name: Run L1 tests (integration; real external comm via traps)
        run: python -m pytest src/tests/L1

      - name: Run L2 tests (e2e against built artifact)
        run: |
          python -m pytest src/tests/L2
          if ($LASTEXITCODE -eq 5) { Write-Host "No L2 tests yet."; exit 0 }
          exit $LASTEXITCODE

  build-and-prerelease:
    name: Build and publish prerelease
    needs: install-and-test
    runs-on: [self-hosted, Windows]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Show Python version
        run: python --version

      - name: Derive PR version string and patch pyproject.toml
        id: version
        run: |
          # PEP 440 form: <base>.dev<PR>+<sha7>. Sorts strictly below <base>.
          $pyproject = Get-Content pyproject.toml -Raw
          if ($pyproject -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            throw "Could not find version in pyproject.toml"
          }
          $base = $matches[1]
          $prNum = "${{ github.event.pull_request.number }}"
          $sha = "${{ github.event.pull_request.head.sha }}".Substring(0, 7)
          $prVersion = "$base.dev$prNum+$sha"
          Write-Host "PR version: $prVersion"
          "pr_version=$prVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $patched = $pyproject -replace '(?m)^version\s*=\s*"[^"]+"', "version = `"$prVersion`""
          Set-Content -Path pyproject.toml -Value $patched -NoNewline

      - name: Install dependencies (after version patch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --windowed --name py-tree-manager `
            --copy-metadata py-tree-manager `
            --add-data ".pipelines/update.bat;." `
            main.py

      - name: Rename artifact
        run: |
          $version = "${{ steps.version.outputs.pr_version }}"
          Move-Item "dist/py-tree-manager.exe" "dist/py-tree-manager-$version.exe"

      - name: Publish prerelease
        run: |
          $version = "${{ steps.version.outputs.pr_version }}"
          $prNum = "${{ github.event.pull_request.number }}"
          $sha = "${{ github.event.pull_request.head.sha }}"
          gh release create "v$version" "dist/py-tree-manager-$version.exe" `
            --prerelease `
            --target "$sha" `
            --title "PR #$prNum" `
            --notes "Test build from PR #$prNum (commit $sha)."
