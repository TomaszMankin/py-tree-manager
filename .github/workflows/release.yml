name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  install-and-test:
    name: Install and test
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run L0 tests (unit, all deps mocked)
        run: python -m pytest src/tests/L0

      - name: Run L1 tests (integration; real external comm via traps)
        run: python -m pytest src/tests/L1

      - name: Run L2 tests (e2e against built artifact)
        run: |
          python -m pytest src/tests/L2
          if ($LASTEXITCODE -eq 5) { Write-Host "No L2 tests yet."; exit 0 }
          exit $LASTEXITCODE

  build-and-release:
    name: Resolve version, build, publish release
    needs: install-and-test
    runs-on: [self-hosted, Windows]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (full history; tag listing needs it)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Python version
        run: python --version

      - name: Resolve next version
        id: bump
        run: .\.pipelines\ci\bump-version.ps1

      - name: Install dependencies (after version patch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --windowed --name py-tree-manager `
            --copy-metadata py-tree-manager `
            --add-data ".pipelines/update.bat;." `
            main.py

      - name: Rename artifact
        env:
          BUMPED_VERSION: ${{ steps.bump.outputs.new_version }}
        run: .\.pipelines\ci\rename-artifact.ps1

      - name: Build installer (Inno Setup)
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          # Rename raw exe to stable name for the installer bundle.
          Copy-Item "dist\py-tree-manager-${{ env.VERSION }}.exe" "dist\PyTreeManager.exe" -Force
          # Compile the Inno Setup installer; skip gracefully if iscc is absent.
          # Install Inno Setup on the runner to enable this step in production.
          # See RELEASE.md for manual fallback instructions.
          try {
            $iscc = Get-Command iscc -ErrorAction Stop
            & iscc "/DMyAppVersion=${{ env.VERSION }}" "installer\py-tree-manager.iss"
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "iscc exited $LASTEXITCODE — installer artifact not produced"
            }
          } catch {
            Write-Warning "iscc not found on PATH — installer not built (see RELEASE.md for manual compile)"
          }
        shell: pwsh

      - name: Publish release
        run: |
          $version = "${{ steps.bump.outputs.new_version }}"
          $assets = @("dist/py-tree-manager-$version.exe")
          # Include installer if it was produced.
          $installer = "installer_output/PyTreeManager-Setup-$version.exe"
          if (Test-Path $installer) {
            $assets += $installer
          }
          gh release create "v$version" @assets `
            --latest `
            --target "${{ github.sha }}" `
            --title "v$version" `
            --notes "Release v$version."
