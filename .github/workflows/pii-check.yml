name: PII check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pii-check:
    name: Scan for personal information
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PII scan
        run: .\.pipelines\ci\pii-check.ps1
